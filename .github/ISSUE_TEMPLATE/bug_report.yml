name: Bug report
description: Report a reproducible problem in the actively maintained parts of the project.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting, confirm the issue affects the active development surface:
        frontend/, backend/, Docker Compose workflow, or contributor tooling.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - frontend
        - backend
        - docker-compose
        - documentation
        - contributor tooling
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the app with...
        2. Open...
        3. Click...
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, stack traces, or screenshots if available.
      render: shell
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 14, Ubuntu 24.04
  - type: input
    id: version
    attributes:
      label: Commit, branch, or environment
      placeholder: main, feature/..., or specific commit SHA
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues first.
          required: true
        - label: This is not a private security issue.
          required: true
