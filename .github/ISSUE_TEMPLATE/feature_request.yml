name: Feature request
description: Suggest an improvement for the actively maintained parts of the project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        Please keep requests focused and explain the problem before the implementation idea.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - docker-compose
        - documentation
        - contributor tooling
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, related issues, or tradeoffs.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues first.
          required: true
        - label: This request is for an actively maintained area of the repo.
          required: true
