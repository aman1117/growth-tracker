version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      vite-toolchain:
        patterns:
          - vite
          - '@vitejs/plugin-react'
          - vite-plugin-pwa
    ignore:
      - dependency-name: vite
        update-types:
          - version-update:semver-major
      - dependency-name: '@vitejs/plugin-react'
        update-types:
          - version-update:semver-major
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    labels:
      - dependencies

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
