name: Deploy Push Worker to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: deploy-pushworker
  cancel-in-progress: false

env:
  AZURE_CONTAINER_REGISTRY: growthtrackeracr
  CONTAINER_IMAGE_NAME: growth-tracker-pushworker
  RESOURCE_GROUP: growth-tracker-rg
  CONTAINER_APP_NAME: growth-tracker-pushworker
  CONTAINER_APP_ENV: growth-tracker-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        working-directory: ./backend
        run: |
          docker build -f Dockerfile.pushworker -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_IMAGE_NAME }}:${{ github.sha }} .
          docker build -f Dockerfile.pushworker -t ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_IMAGE_NAME }}:latest .
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_IMAGE_NAME }}:latest

      - name: Check if Container App exists
        id: check-app
        run: |
          if az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Container App (if not exists)
        if: steps.check-app.outputs.exists == 'false'
        run: |
          az containerapp create \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --environment ${{ env.CONTAINER_APP_ENV }} \
            --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_IMAGE_NAME }}:${{ github.sha }} \
            --registry-server ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --min-replicas 0 \
            --max-replicas 3 \
            --cpu 0.25 \
            --memory 0.5Gi \
            --ingress external \
            --target-port 8000

      - name: Deploy to Azure Container Apps
        if: steps.check-app.outputs.exists == 'true'
        shell: bash
        env:
          IMAGE_TO_DEPLOY: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_IMAGE_NAME }}:${{ github.sha }}
        run: |
          set -euo pipefail

          max_attempts=8
          sleep_seconds=15

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Updating ${CONTAINER_APP_NAME} with ${IMAGE_TO_DEPLOY} (attempt ${attempt}/${max_attempts})"

            output=$(az containerapp update \
              --name "${CONTAINER_APP_NAME}" \
              --resource-group "${RESOURCE_GROUP}" \
              --image "${IMAGE_TO_DEPLOY}" \
              --output json 2>&1) && break

            echo "$output"

            if [[ "$output" != *"ContainerAppOperationInProgress"* ]]; then
              echo "Update failed for a non-retryable reason."
              exit 1
            fi

            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "Container App remained busy after ${max_attempts} attempts."
              exit 1
            fi

            echo "Container App has an active provisioning operation. Retrying in ${sleep_seconds}s."
            sleep "$sleep_seconds"
          done

          az containerapp show \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query properties.provisioningState \
            --output tsv
